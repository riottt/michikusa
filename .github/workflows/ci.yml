name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEMO_MODE: "true"
      NEXT_PUBLIC_DEMO_MODE: "true"
      AGENT_SERVICE_URL: http://127.0.0.1:8081
      AGENT_SHARED_SECRET: ci-only-secret
      TURSO_DATABASE_URL: file:data/ci-michikusa.db
      TOKEN_ENCRYPTION_KEY: ci-only-encryption-key-with-sufficient-length
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: agent_service/requirements.txt
      - run: npm ci
      - run: python -m pip install --disable-pip-version-check -r agent_service/requirements.txt
      - run: npm run lint
      - run: npm run typecheck
      - run: PYTHONPATH=agent_service python -m pytest agent_service/tests -q
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high
